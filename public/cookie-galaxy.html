<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Cookie Galaxy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a0a00;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #hero-content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }
        
        #hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 4px 30px rgba(0,0,0,0.5);
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        
        #hero-content .highlight {
            color: #f4a460;
            display: block;
        }
        
        #shop-btn {
            pointer-events: auto;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a0a00;
            background: linear-gradient(135deg, #f4a460 0%, #d2691e 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(244, 164, 96, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        #shop-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 50px rgba(244, 164, 96, 0.6);
        }
        
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.95);
            color: #1a0a00;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            transform: translate(-50%, -100%);
            transition: opacity 0.2s ease;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        
        #tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(255, 255, 255, 0.95);
        }
        
        #tooltip.visible {
            opacity: 1;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f4a460;
            font-size: 1.2rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hero-content">
        <h1>
            Freshly Baked,
            <span class="highlight">Just For You</span>
        </h1>
        <button id="shop-btn" onclick="window.location.href='/shop'">Shop Now</button>
    </div>
    
    <div id="tooltip">Add to cart 🍪</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0a00);
        scene.fog = new THREE.Fog(0x1a0a00, 200, 900);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 600;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Galaxy group for tilting
        const galaxyGroup = new THREE.Group();
        scene.add(galaxyGroup);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffaa66, 1.2, 1000);
        pointLight.position.set(0, 0, 0);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 2048;
        pointLight.shadow.mapSize.height = 2048;
        scene.add(pointLight);
        
        const rimLight = new THREE.DirectionalLight(0xff6600, 0.5);
        rimLight.position.set(0, 100, 200);
        scene.add(rimLight);
        
        // Procedural cookie texture generator
        function createCookieTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Base cookie color
            ctx.fillStyle = '#c8783a';
            ctx.beginPath();
            ctx.arc(128, 128, 120, 0, Math.PI * 2);
            ctx.fill();
            
            // Subtle gradient for depth
            const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 120);
            gradient.addColorStop(0, 'rgba(255, 200, 150, 0.2)');
            gradient.addColorStop(1, 'rgba(100, 50, 20, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Chocolate chips
            const chipCount = 8 + Math.floor(Math.random() * 6);
            for (let i = 0; i < chipCount; i++) {
                const angle = (Math.PI * 2 * i) / chipCount + Math.random() * 0.5;
                const radius = 30 + Math.random() * 70;
                const x = 128 + Math.cos(angle) * radius;
                const y = 128 + Math.sin(angle) * radius;
                const chipSize = 8 + Math.random() * 10;
                
                ctx.fillStyle = '#3d2314';
                ctx.beginPath();
                ctx.arc(x, y, chipSize, 0, Math.PI * 2);
                ctx.fill();
                
                // Chip highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(x - 2, y - 2, chipSize * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Texture noise
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * 256;
                const y = Math.random() * 256;
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255, 200, 150, 0.1)' : 'rgba(80, 40, 15, 0.1)';
                ctx.fillRect(x, y, 2, 2);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }
        
        // Create cookie mesh
        function createCookie(index) {
            const geometry = new THREE.CylinderGeometry(18, 18, 3, 32);
            const texture = createCookieTexture();
            
            const material = new THREE.MeshStandardMaterial({
                map: texture,
                color: 0xffffff,
                roughness: 0.8,
                metalness: 0.1,
                emissive: 0x000000,
                bumpMap: texture,
                bumpScale: 0.5
            });
            
            const cookie = new THREE.Mesh(geometry, material);
            cookie.castShadow = true;
            cookie.receiveShadow = true;
            
            // Spherical orbit positioning
            const radius = 150 + Math.random() * 250;
            const inclination = Math.acos(2 * Math.random() - 1);
            const azimuth = Math.random() * Math.PI * 2;
            
            cookie.position.x = radius * Math.sin(inclination) * Math.cos(azimuth);
            cookie.position.y = radius * Math.sin(inclination) * Math.sin(azimuth);
            cookie.position.z = radius * Math.cos(inclination);
            
            // Random initial rotation
            cookie.rotation.x = Math.random() * Math.PI;
            cookie.rotation.y = Math.random() * Math.PI;
            cookie.rotation.z = Math.random() * Math.PI;
            
            // Store animation data
            cookie.userData = {
                index: index,
                radius: radius,
                inclination: inclination,
                azimuth: azimuth,
                orbitSpeed: 0.0005 + Math.random() * 0.001,
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.02,
                    y: (Math.random() - 0.5) * 0.02,
                    z: (Math.random() - 0.5) * 0.01
                },
                originalScale: 1,
                isHovered: false,
                isAnimating: false
            };
            
            return cookie;
        }
        
        // Create 40 cookies
        const cookies = [];
        for (let i = 0; i < 40; i++) {
            const cookie = createCookie(i);
            cookies.push(cookie);
            galaxyGroup.add(cookie);
        }
        
        // Particle system for crumb burst
        const particleGeometry = new THREE.BufferGeometry();
        const particleCount = 12;
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];
        
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = 0;
            positions[i * 3 + 1] = 0;
            positions[i * 3 + 2] = 0;
            velocities.push(new THREE.Vector3());
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            color: 0xc8783a,
            size: 4,
            transparent: true,
            opacity: 0
        });
        
        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        particleSystem.visible = false;
        scene.add(particleSystem);
        
        // Raycaster for hover detection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredCookie = null;
        
        // Mouse movement tracking
        let targetTiltX = 0;
        let targetTiltY = 0;
        let currentTiltX = 0;
        let currentTiltY = 0;
        
        function onMouseMove(event) {
            // Normalized mouse coordinates for raycaster
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Target tilt angles (max ±20 degrees)
            targetTiltY = mouse.x * 20 * (Math.PI / 180);
            targetTiltX = -mouse.y * 20 * (Math.PI / 180);
            
            // Update tooltip position
            const tooltip = document.getElementById('tooltip');
            if (hoveredCookie) {
                tooltip.style.left = event.clientX + 'px';
                tooltip.style.top = (event.clientY - 20) + 'px';
            }
        }
        
        function onClick(event) {
            if (hoveredCookie && !hoveredCookie.userData.isAnimating) {
                animateCookieClick(hoveredCookie);
            }
        }
        
        function animateCookieClick(cookie) {
            cookie.userData.isAnimating = true;
            
            // Store original position
            const originalPos = cookie.position.clone();
            const originalRot = cookie.rotation.clone();
            
            // Calculate direction to camera
            const direction = new THREE.Vector3().subVectors(camera.position, cookie.position).normalize();
            
            // GSAP animation: fly toward camera
            gsap.to(cookie.position, {
                x: cookie.position.x + direction.x * 300,
                y: cookie.position.y + direction.y * 300,
                z: cookie.position.z + direction.z * 500,
                duration: 0.6,
                ease: "power2.out"
            });
            
            gsap.to(cookie.scale, {
                x: 2,
                y: 2,
                z: 2,
                duration: 0.6,
                ease: "power2.out"
            });
            
            gsap.to(cookie.rotation, {
                x: originalRot.x + Math.PI * 2,
                y: originalRot.y + Math.PI * 2,
                duration: 0.6,
                ease: "power2.out"
            });
            
            // Fade out
            gsap.to(cookie.material, {
                opacity: 0,
                duration: 0.3,
                delay: 0.3,
                onComplete: () => {
                    cookie.visible = false;
                    cookie.userData.isAnimating = false;
                    
                    // Reset after delay
                    setTimeout(() => {
                        resetCookie(cookie, originalPos, originalRot);
                    }, 1000);
                }
            });
            
            // Particle burst
            createParticleBurst(cookie.position);
        }
        
        function createParticleBurst(position) {
            particleSystem.position.copy(position);
            particleSystem.visible = true;
            particleMaterial.opacity = 1;
            
            const positions = particleSystem.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = 0;
                
                velocities[i].set(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                );
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Animate particles
            let frame = 0;
            function animateParticles() {
                if (frame > 60) {
                    particleSystem.visible = false;
                    return;
                }
                
                const positions = particleSystem.geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += velocities[i].x;
                    positions[i * 3 + 1] += velocities[i].y;
                    positions[i * 3 + 2] += velocities[i].z;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleMaterial.opacity = 1 - (frame / 60);
                
                frame++;
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
        
        function resetCookie(cookie, originalPos, originalRot) {
            cookie.position.copy(originalPos);
            cookie.rotation.copy(originalRot);
            cookie.scale.set(1, 1, 1);
            cookie.material.opacity = 1;
            cookie.visible = true;
            cookie.userData.isHovered = false;
        }
        
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Smooth lerp for galaxy tilt
            currentTiltX += (targetTiltX - currentTiltX) * 0.05;
            currentTiltY += (targetTiltY - currentTiltY) * 0.05;
            
            galaxyGroup.rotation.x = currentTiltX;
            galaxyGroup.rotation.y = currentTiltY;
            
            // Animate each cookie
            cookies.forEach(cookie => {
                if (cookie.userData.isAnimating) return;
                
                // Individual rotation
                cookie.rotation.x += cookie.userData.rotationSpeed.x;
                cookie.rotation.y += cookie.userData.rotationSpeed.y;
                cookie.rotation.z += cookie.userData.rotationSpeed.z;
                
                // Orbit around center
                cookie.userData.azimuth += cookie.userData.orbitSpeed;
                cookie.position.x = cookie.userData.radius * Math.sin(cookie.userData.inclination) * Math.cos(cookie.userData.azimuth);
                cookie.position.y = cookie.userData.radius * Math.sin(cookie.userData.inclination) * Math.sin(cookie.userData.azimuth);
                cookie.position.z = cookie.userData.radius * Math.cos(cookie.userData.inclination);
                
                // Always face camera (billboard effect)
                cookie.lookAt(camera.position);
            });
            
            // Raycasting for hover
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cookies);
            
            const tooltip = document.getElementById('tooltip');
            
            if (intersects.length > 0 && !intersects[0].object.userData.isAnimating) {
                const newHovered = intersects[0].object;
                
                if (hoveredCookie !== newHovered) {
                    // Reset previous
                    if (hoveredCookie && !hoveredCookie.userData.isAnimating) {
                        gsap.to(hoveredCookie.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                        gsap.to(hoveredCookie.material, { emissiveIntensity: 0, duration: 0.3 });
                        hoveredCookie.userData.isHovered = false;
                    }
                    
                    // Set new
                    hoveredCookie = newHovered;
                    hoveredCookie.userData.isHovered = true;
                    
                    gsap.to(hoveredCookie.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.3, ease: "back.out(1.7)" });
                    gsap.to(hoveredCookie.material, { emissive: 0xffaa66, emissiveIntensity: 0.3, duration: 0.3 });
                    
                    document.body.style.cursor = 'pointer';
                    tooltip.classList.add('visible');
                }
            } else {
                if (hoveredCookie && !hoveredCookie.userData.isAnimating) {
                    gsap.to(hoveredCookie.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                    gsap.to(hoveredCookie.material, { emissiveIntensity: 0, duration: 0.3 });
                    hoveredCookie.userData.isHovered = false;
                    hoveredCookie = null;
                    document.body.style.cursor = 'default';
                    tooltip.classList.remove('visible');
                }
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Initial entrance animation
        gsap.from("#hero-content h1", {
            y: 50,
            opacity: 0,
            duration: 1,
            delay: 0.5,
            ease: "power3.out"
        });
        
        gsap.from("#shop-btn", {
            y: 30,
            opacity: 0,
            duration: 0.8,
            delay: 0.8,
            ease: "power3.out"
        });
        
        cookies.forEach((cookie, i) => {
            cookie.scale.set(0, 0, 0);
            gsap.to(cookie.scale, {
                x: 1,
                y: 1,
                z: 1,
                duration: 0.6,
                delay: 0.1 + i * 0.03,
                ease: "back.out(1.7)"
            });
        });
    </script>
</body>
</html>
